name: CI

# Full pull-request gate: lint, typecheck, unit tests, build, edge-auth audit.
# Anything red here blocks the merge.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  guard:
    name: Guard the build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # CI doesn't have real secrets; the Supabase URL/key are public anon and
      # required at build time for the bundle. Real prod values live in the
      # host (Cloudflare Pages) env.
      VITE_SUPABASE_URL: https://stub.supabase.co
      VITE_SUPABASE_PROJECT_ID: stub
      VITE_SUPABASE_PUBLISHABLE_KEY: stub
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Lint is non-blocking: it is pre-existing red on `no-console` warnings, and
      # gating on it would forever wedge the `guard` job (hiding the REAL gates
      # below). Keep it visible but don't fail the job — so `guard` can be made a
      # required status check on `main` and a meaningful Vercel "wait for CI" gate.
      - name: Lint (non-blocking)
        run: bun run lint
        continue-on-error: true

      - name: Typecheck
        run: bun run typecheck

      - name: Edge-function auth audit
        run: bun run audit:edge-auth

      - name: Unit tests
        run: bun run test

      - name: Build (production mode)
        run: bun run build

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: guard
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    env:
      VITE_SUPABASE_URL: https://stub.supabase.co
      VITE_SUPABASE_PROJECT_ID: stub
      VITE_SUPABASE_PUBLISHABLE_KEY: stub
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }
      - run: bun install --frozen-lockfile
      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium firefox webkit
      - name: Run E2E
        run: bunx playwright test
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
