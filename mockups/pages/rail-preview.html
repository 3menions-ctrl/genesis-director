<!doctype html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..600&family=Inter:wght@300;400;500;600&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
<title>RAIL PREVIEW</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--acc:hsl(214 90% 62%)}
  html,body{background:#06070a;color:rgba(255,255,255,.8);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased}
  .frame{display:flex;min-height:760px}
  .glow{position:fixed;top:-240px;right:0;width:800px;height:800px;border-radius:9999px;background:radial-gradient(circle,hsl(214 90% 62%/.1),transparent 65%);filter:blur(80px);pointer-events:none}
  /* RAIL */
  .rail{position:relative;width:104px;flex:0 0 104px;display:flex;flex-direction:column;backdrop-filter:blur(20px);
    background:linear-gradient(165deg,rgba(255,255,255,.05),rgba(255,255,255,.015) 60%,rgba(255,255,255,.01));box-shadow:0 30px 90px -50px rgba(0,0,0,.95)}
  .rail .spec{position:absolute;inset-inline:0;top:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.18),transparent)}
  .brand{display:flex;flex-direction:column;align-items:center;gap:8px;padding:28px 0 20px}
  .mark{width:40px;height:40px;border-radius:16px;display:grid;place-items:center;background:linear-gradient(140deg,hsl(214 90% 62%/.95),hsl(214 90% 62%/.22));box-shadow:0 0 24px hsl(214 90% 62%/.5)}
  .brand span{font-family:'Roboto Mono',monospace;font-size:8px;font-weight:600;letter-spacing:.26em;text-transform:uppercase;color:rgba(255,255,255,.4)}
  nav{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 10px}
  .div{margin:10px 0;width:36px;height:1px;background:rgba(255,255,255,.07)}
  .item{width:100%;display:flex;flex-direction:column;align-items:center;gap:6px;padding:10px 0;border-radius:16px;text-decoration:none;cursor:pointer}
  .item:hover{background:rgba(255,255,255,.03)}
  .tile{position:relative;width:48px;height:48px;border-radius:16px;display:grid;place-items:center;background:rgba(255,255,255,.04);color:rgba(255,255,255,.55);transition:all .2s}
  .item:hover .tile{background:rgba(255,255,255,.08);color:#fff}
  .lbl{font-size:10px;letter-spacing:.02em;color:rgba(255,255,255,.4);text-align:center;line-height:1}
  .item:hover .lbl{color:rgba(255,255,255,.7)}
  .item.on .tile{background:hsl(214 90% 62%/.16);color:var(--acc);box-shadow:0 0 26px -4px hsl(214 90% 62%/.65);outline:1px solid hsl(214 90% 62%/.4)}
  .item.on .lbl{color:#fff}
  .tile svg{width:22px;height:22px;stroke:currentColor;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round}
  .lock{position:absolute;bottom:-4px;right:-4px;width:16px;height:16px;border-radius:9999px;background:#06070a;display:grid;place-items:center}
  .lock svg{width:9px;height:9px;color:rgba(255,255,255,.55)}
  .item.locked{opacity:.4}
  .op{display:flex;flex-direction:column;align-items:center;gap:10px;padding:20px 0}
  .av{position:relative;width:40px;height:40px;border-radius:9999px;display:grid;place-items:center;color:#fff;font-size:12px;font-weight:600;background:linear-gradient(135deg,hsl(214 90% 62%/.4),hsl(214 90% 62%/.08))}
  .av .on2{position:absolute;top:-2px;right:-2px;width:6px;height:6px;border-radius:9999px;background:#34d399;box-shadow:0 0 6px rgba(16,185,129,.7)}
  .pwr{width:32px;height:32px;border-radius:9999px;background:rgba(255,255,255,.06);display:grid;place-items:center;color:rgba(255,255,255,.4)}
  .pwr svg{width:14px;height:14px;stroke:currentColor;stroke-width:1.8;fill:none;stroke-linecap:round}
  /* faux content */
  .main{flex:1;display:flex;flex-direction:column}
  .topbar{height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 40px;backdrop-filter:blur(8px);background:rgba(255,255,255,.02);position:relative}
  .topbar .ln{position:absolute;inset-inline:0;bottom:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.1),transparent)}
  .crumb{font-family:'Roboto Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.3em;color:rgba(255,255,255,.4)}
  .crumb b{color:#fff;font-weight:500}
  .body{flex:1;padding:48px}
  .h{font-family:'Fraunces',serif;font-weight:600;font-size:44px;letter-spacing:-.02em;color:#fff}
  .eye{font-family:'Roboto Mono',monospace;font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--acc)}
  .cards{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:36px}
  .card{height:120px;border-radius:22px;background:linear-gradient(160deg,rgba(255,255,255,.06),rgba(255,255,255,.015));box-shadow:0 40px 110px -55px rgba(0,0,0,.9),inset 0 1px 0 rgba(255,255,255,.12)}
</style></head>
<body>
<div class="glow"></div>
<section id="A" class="frame">
  <!-- RAIL -->
  <aside class="rail">
    <span class="spec"></span>
    <div class="brand">
      <div class="mark"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg></div>
      <span>Membrane</span>
    </div>
    <nav>
      <a class="item on"><span class="tile"><svg viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg></span><span class="lbl">Dashboard</span></a>
      <span class="div"></span>
      <a class="item"><span class="tile"><svg viewBox="0 0 24 24"><circle cx="9" cy="7" r="4"/><path d="M3 21v-1a6 6 0 0 1 6-6h0a6 6 0 0 1 6 6v1"/><path d="M16 3.1a4 4 0 0 1 0 7.8"/></svg></span><span class="lbl">People</span></a>
      <a class="item"><span class="tile"><svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 9h18M8 5v14"/></svg></span><span class="lbl">Production</span></a>
      <a class="item"><span class="tile"><svg viewBox="0 0 24 24"><rect x="2" y="6" width="20" height="13" rx="2"/><path d="M2 10h20"/><circle cx="17" cy="14" r="1.4"/></svg></span><span class="lbl">Money</span></a>
      <a class="item"><span class="tile"><svg viewBox="0 0 24 24"><path d="M3 17l6-6 4 4 8-8"/><path d="M21 7v6h-6"/></svg></span><span class="lbl">Growth</span></a>
      <a class="item"><span class="tile"><svg viewBox="0 0 24 24"><path d="M13 2 4 14h7l-1 8 9-12h-7l1-8z"/></svg></span><span class="lbl">System</span></a>
      <span class="div"></span>
      <a class="item"><span class="tile"><svg viewBox="0 0 24 24"><path d="M8 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9l-6-6z"/><path d="M8 8h6M8 12h8M8 16h5"/></svg></span><span class="lbl">Audit</span></a>
      <a class="item locked"><span class="tile"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.6 1.6 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.6 1.6 0 0 0-2.7 1.1V21a2 2 0 0 1-4 0v-.1A1.6 1.6 0 0 0 7 19.4a1.6 1.6 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.6 1.6 0 0 0-1.1-2.7H1a2 2 0 0 1 0-4h.1A1.6 1.6 0 0 0 2.6 7"/></svg><span class="lock"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span></span><span class="lbl">Config</span></a>
    </nav>
    <div class="op">
      <div class="av">C<span class="on2"></span></div>
      <div class="pwr"><svg viewBox="0 0 24 24"><path d="M12 2v10"/><path d="M5.5 6.5a8 8 0 1 0 13 0"/></svg></div>
    </div>
  </aside>
  <!-- faux content to show context -->
  <div class="main">
    <div class="topbar"><span class="ln"></span><div class="crumb">Directory / Pulse / <b>Dashboard</b></div><div class="crumb" style="color:rgba(52,211,153,.7)">● Uptime 99.98%</div></div>
    <div class="body">
      <div class="eye">01 // PULSE</div>
      <div class="h">Dashboard.</div>
      <div class="cards"><div class="card"></div><div class="card"></div><div class="card"></div></div>
    </div>
  </div>
</section>
</body></html>
