name: Admin Sidebar Route Contract

# Guards the AdminLayout sidebar ↔ App.tsx route wiring on every PR.
# Fails the build if any sidebar item is unrouted, mis-wired to the wrong
# component, missing its lazy import, or pointing at a non-existent file.

on:
  pull_request:
    branches: [main]
    paths:
      - "src/refine/AdminLayout.tsx"
      - "src/refine/pages/ops/_registry.ts"
      - "src/refine/rbac/**"
      - "src/App.tsx"
      - "src/test/admin/**"
      - "package.json"
      - "bun.lockb"
      - ".github/workflows/admin-sidebar-tests.yml"
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  admin-sidebar:
    name: Admin sidebar route contract
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run admin sidebar route tests
        run: |
          bunx vitest run \
            src/test/admin/adminSidebarRegistry.test.ts \
            src/test/admin/adminSidebarRoutes.test.ts \
            src/test/admin/adminRbac.test.ts \
            src/test/admin/opsRegistryAppRoutes.test.ts \
            --reporter=verbose