# Deploy the Breakout VFX cog to Replicate.
#
# Manual-only: the cog build needs Docker, which the local dev environment
# doesn't have — GitHub runners do. Pushes the CPU compositor model to
# r8.im/3menions-ctrl/breakout-vfx; the apply-breakout-vfx edge function
# consumes it via REPLICATE_BREAKOUT_MODEL.
name: Deploy VFX Cog
on:
  workflow_dispatch: {}

jobs:
  push-cog:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      # Official action — handles r8.im registry auth with the API token
      # (plain `cog login` demands the browser-only CLI token instead).
      - uses: replicate/setup-cog@v2
        with:
          token: ${{ secrets.REPLICATE_API_TOKEN }}

      - name: Build and push
        working-directory: python/breakout_pipeline
        run: cog push r8.im/3menions-ctrl/breakout-vfx
