name: Deploy to Cloudflare Pages (DISABLED — prod is Vercel)

# ⚠️ DISABLED 2026-06-27. PRODUCTION IS SERVED BY VERCEL, NOT CLOUDFLARE.
# Verified live: smallbridges.co / www.smallbridges.co return `server: Vercel`
# (x-vercel-id). Vercel deploys via its GitHub integration on push to main.
# This Cloudflare Pages pipeline is NOT attached to the domain — leaving it on
# `push: main` caused redundant double-builds and confusion about "what's live".
# Triggers are now manual-only (workflow_dispatch). Do NOT re-enable the push
# trigger unless you are intentionally cutting the domain over to Cloudflare
# (then also re-point DNS and disable the Vercel project). See CLAUDE.md.
#
# NOTE: the typecheck/edge-auth/test deploy gate this workflow added (audit #20)
# only protected THIS now-disabled pipeline — it does NOT gate the live Vercel
# deploys. Re-implement that gate on the Vercel path (required CI status on the
# production branch, or a Vercel "Ignored Build Step" / buildCommand) to truly
# close that blocker.
#
# Deploys the production build to Cloudflare Pages. Kept for reference / manual
# fallback only.
#
# Required repo secrets:
#   CLOUDFLARE_API_TOKEN     — token with `Cloudflare Pages: Edit`
#   CLOUDFLARE_ACCOUNT_ID    — your account id
#   VITE_SUPABASE_URL        — prod Supabase URL
#   VITE_SUPABASE_PROJECT_ID — prod Supabase project ref
#   VITE_SUPABASE_PUBLISHABLE_KEY — prod anon publishable key
#   VITE_GLITCHTIP_DSN       — error tracker DSN (optional)
#   VITE_POSTHOG_KEY         — product analytics (optional)
#   VITE_POSTHOG_HOST        — analytics host (optional)
#   VITE_TURNSTILE_SITE_KEY  — Cloudflare Turnstile site key (optional)

# Manual-only. Push/PR auto-triggers removed so this no longer double-builds
# alongside Vercel. Run via Actions → "Run workflow" if you ever need it.
on:
  workflow_dispatch:

jobs:
  deploy:
    name: Cloudflare Pages
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      deployments: write
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      VITE_GLITCHTIP_DSN: ${{ secrets.VITE_GLITCHTIP_DSN }}
      VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}
      VITE_POSTHOG_HOST: ${{ secrets.VITE_POSTHOG_HOST }}
      VITE_TURNSTILE_SITE_KEY: ${{ secrets.VITE_TURNSTILE_SITE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }
      - run: bun install --frozen-lockfile

      # ── Quality gate (audit fix): deploy-cloudflare ran independently of
      # ci.yml and GitHub Actions cannot express a cross-workflow `needs:`, so
      # type errors, failing tests, or a failing edge-auth audit still shipped
      # to prod. Run the security-critical gate here so a red check blocks the
      # publish below. Lint is intentionally non-blocking (known pre-existing
      # red); typecheck / edge-auth / unit tests are hard gates.
      - name: Lint (non-blocking)
        run: bun run lint
        continue-on-error: true
      - name: Typecheck (gate)
        run: bun run typecheck
      - name: Edge-function auth audit (gate)
        run: bun run audit:edge-auth
      - name: Unit tests (gate)
        run: bun run test

      - run: bun run build
      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=smallbridges --branch=${{ github.head_ref || github.ref_name }}
